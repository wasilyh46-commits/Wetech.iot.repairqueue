<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คิวซ่อม — คอมพิวเตอร์ & กล้องวงจรปิด</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101820;
    --board:#121b24;
    --panel:#182430;
    --panel-2:#1f2e3b;
    --line:#31414f;
    --line-soft:#263440;
    --text:#e7ecf1;
    --text-dim:#8fa0af;
    --paper:#ece4d3;
    --paper-text:#241f16;
    --paper-dim:#5c5343;
    --copper:#c97b3d;
    --teal:#4fb6a8;
    --blue:#5fa8d3;
    --gold:#e0b94f;
    --green:#6fa97a;
    --steel:#8c97a6;
    --red:#c1503f;
    --radius:8px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans Thai', sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--teal);color:#0b1015;}

  .mono{font-family:'IBM Plex Mono', monospace;}
  .display{font-family:'Chakra Petch', sans-serif;}

  /* ---------- connection banner ---------- */
  .conn-banner{
    display:none; align-items:center; gap:8px;
    padding:8px 20px; font-size:12.5px;
    background:#3a2420; color:#e8b4a8; border-bottom:1px solid #5c342c;
  }
  .conn-banner.show{display:flex;}
  .conn-banner.ok{background:#1e3327; color:#9fd4ac; border-bottom:1px solid #2d4a35;}

  /* ---------- topbar ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:16px;
    padding:14px 20px;
    background:linear-gradient(180deg, var(--panel) 0%, rgba(24,36,48,0.92) 100%);
    border-bottom:1px solid var(--line);
    backdrop-filter:blur(6px);
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:10px; margin-right:auto;}
  .brand-mark{
    width:34px; height:34px; border-radius:7px;
    background:repeating-linear-gradient(45deg, var(--teal) 0 3px, transparent 3px 7px);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    flex:none;
  }
  .brand-mark::after{content:'⏚'; color:var(--bg); font-size:16px; font-weight:700;}
  .brand-text h1{
    font-family:'Chakra Petch', sans-serif;
    font-size:18px; font-weight:700; margin:0; letter-spacing:.02em;
    color:var(--text);
  }
  .brand-text p{margin:0; font-size:11.5px; color:var(--text-dim); letter-spacing:.04em;}

  .search-wrap{position:relative; min-width:200px; flex:1 1 220px; max-width:320px;}
  .search-wrap input{
    width:100%; padding:9px 12px 9px 32px;
    background:var(--bg); border:1px solid var(--line); border-radius:6px;
    color:var(--text); font-family:inherit; font-size:13.5px;
  }
  .search-wrap input:focus{outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal);}
  .search-wrap svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.55;}

  .filter-chips{display:flex; gap:6px; flex-wrap:wrap;}
  .chip{
    padding:7px 12px; border-radius:20px; border:1px solid var(--line);
    background:transparent; color:var(--text-dim); font-size:12.5px; cursor:pointer;
    font-family:'IBM Plex Sans Thai', sans-serif;
  }
  .chip:hover{border-color:var(--teal); color:var(--text);}
  .chip.active{background:var(--teal); border-color:var(--teal); color:#0b1015; font-weight:600;}

  .btn-new{
    display:flex; align-items:center; gap:6px;
    padding:9px 16px; border-radius:6px; border:none;
    background:var(--copper); color:#1a1006; font-weight:600; font-size:13.5px;
    cursor:pointer; font-family:'IBM Plex Sans Thai', sans-serif;
    white-space:nowrap;
  }
  .btn-new:hover{background:#dd8a49;}
  .btn-new:focus-visible{outline:2px solid var(--text); outline-offset:2px;}

  /* ---------- board ---------- */
  .board{
    display:flex; gap:14px; padding:18px 20px 40px;
    overflow-x:auto;
  }
  .column{
    flex:1 1 250px; min-width:250px; max-width:310px;
    background:var(--board);
    display:flex; flex-direction:column;
  }
  .col-head{
    display:flex; align-items:baseline; gap:8px;
    padding:4px 4px 10px; border-bottom:2px solid var(--col-color, var(--line));
    margin-bottom:12px;
  }
  .col-eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px;
    color:var(--col-color, var(--text-dim)); border:1px solid var(--col-color, var(--line));
    border-radius:4px; padding:1px 6px; flex:none;
  }
  .col-title{font-family:'Chakra Petch', sans-serif; font-weight:600; font-size:14px; flex:1;}
  .col-count{font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--text-dim);}

  .col-body{display:flex; flex-direction:column; gap:10px; min-height:60px;}
  .col-empty{
    border:1px dashed var(--line); border-radius:var(--radius);
    padding:16px 10px; text-align:center; color:var(--text-dim); font-size:12px;
  }

  /* ---------- ticket card (signature element) ---------- */
  .ticket{
    position:relative;
    background:var(--paper); color:var(--paper-text);
    border-radius:3px 8px 8px 3px;
    padding:14px 12px 12px 30px;
    cursor:pointer;
    box-shadow:2px 3px 0 rgba(0,0,0,0.28);
    border:1px solid #d9cfb8;
    transition:transform .12s ease;
  }
  .ticket:hover{transform:translateY(-2px);}
  .ticket:focus-visible{outline:2px solid var(--teal); outline-offset:2px;}
  .ticket::before{
    content:''; position:absolute; top:13px; left:11px;
    width:9px; height:9px; border-radius:50%;
    background:var(--board);
    box-shadow:0 0 0 2px #b9ac8e;
  }
  .ticket::after{
    content:''; position:absolute; left:4px; top:0; bottom:0; width:0;
    border-left:1.5px dashed #b9ac8e;
  }
  .ticket.overdue{box-shadow:2px 3px 0 rgba(0,0,0,0.28), inset 3px 0 0 var(--red);}
  .t-no{font-family:'IBM Plex Mono', monospace; font-size:10.5px; color:var(--paper-dim); letter-spacing:.03em;}
  .t-customer{font-family:'Chakra Petch', sans-serif; font-weight:600; font-size:14.5px; margin:2px 0 4px;}
  .t-device{font-size:12px; color:var(--paper-dim); margin-bottom:6px;}
  .t-issue{font-size:12px; color:#3a3324; line-height:1.4; max-height:2.8em; overflow:hidden;}
  .t-foot{display:flex; justify-content:space-between; align-items:center; margin-top:8px; font-size:10.5px; color:var(--paper-dim);}
  .t-days{font-family:'IBM Plex Mono', monospace;}
  .t-days.warn{color:var(--red); font-weight:600;}

  /* ---------- overlay / modal ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(10,14,18,.68);
    display:flex; align-items:flex-start; justify-content:center;
    padding:36px 16px; overflow-y:auto; z-index:100;
  }
  .modal{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    width:100%; max-width:520px; padding:22px; margin-bottom:40px;
  }
  .modal h2{
    font-family:'Chakra Petch', sans-serif; font-size:18px; margin:0 0 4px;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
  }
  .modal .sub{color:var(--text-dim); font-size:12px; margin:0 0 18px; font-family:'IBM Plex Mono',monospace;}
  .close-x{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer; line-height:1;}
  .close-x:hover{color:var(--text);}

  .field{margin-bottom:13px;}
  .field label{display:block; font-size:12px; color:var(--text-dim); margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%; padding:9px 10px; background:var(--bg); border:1px solid var(--line);
    border-radius:6px; color:var(--text); font-family:'IBM Plex Sans Thai',sans-serif; font-size:13.5px;
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal);}
  .field textarea{resize:vertical; min-height:64px;}
  .row2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .form-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}
  .btn{
    padding:9px 16px; border-radius:6px; border:1px solid var(--line);
    background:transparent; color:var(--text); font-size:13.5px; cursor:pointer;
    font-family:'IBM Plex Sans Thai', sans-serif;
  }
  .btn:hover{border-color:var(--text-dim);}
  .btn-primary{background:var(--teal); border-color:var(--teal); color:#0b1015; font-weight:600;}
  .btn-primary:hover{background:#5fc6b8;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}

  /* status stepper in detail modal */
  .stepper{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px;}
  .step-btn{
    flex:1 1 auto; min-width:88px;
    padding:8px 6px; border-radius:6px; border:1px solid var(--line);
    background:transparent; color:var(--text-dim); font-size:11.5px; cursor:pointer; text-align:center;
    font-family:'IBM Plex Sans Thai', sans-serif;
  }
  .step-btn.current{border-color:var(--step-color); color:var(--text); background:rgba(255,255,255,0.04); font-weight:600;}
  .step-btn .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--step-color); margin-right:5px;}

  .info-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; margin-bottom:16px; font-size:13px;}
  .info-grid .k{color:var(--text-dim); font-size:11px;}
  .info-grid .v{margin-top:2px;}

  .section-title{font-family:'Chakra Petch', sans-serif; font-size:13px; font-weight:600; margin:18px 0 8px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em;}

  .note-item{border-left:2px solid var(--line-soft); padding:6px 0 6px 10px; margin-bottom:6px; font-size:12.5px;}
  .note-time{color:var(--text-dim); font-size:10.5px; font-family:'IBM Plex Mono',monospace; display:block; margin-bottom:2px;}
  .history-item{display:flex; gap:8px; align-items:baseline; font-size:12px; color:var(--text-dim); margin-bottom:4px;}
  .history-item .h-dot{width:6px;height:6px;border-radius:50%;background:var(--text-dim); flex:none;}
  .history-item b{color:var(--text); font-weight:500;}

  .danger-zone{margin-top:20px; padding-top:14px; border-top:1px solid var(--line); display:flex; justify-content:flex-end;}
  .btn-danger{border-color:var(--red); color:var(--red);}
  .btn-danger.confirming{background:var(--red); color:#fff;}

  .footnote{
    text-align:center; color:var(--text-dim); font-size:11px; padding:0 20px 24px;
  }
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--panel-2); border:1px solid var(--line); padding:10px 18px;
    border-radius:6px; font-size:13px; z-index:200; opacity:0; transition:opacity .25s ease;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  .empty-board{text-align:center; padding:60px 20px; color:var(--text-dim);}

  .link-btn{
    background:none; border:1px solid var(--line); color:var(--text-dim);
    padding:8px 13px; border-radius:6px; font-size:12.5px; cursor:pointer;
    font-family:'IBM Plex Sans Thai', sans-serif; white-space:nowrap;
  }
  .link-btn:hover{border-color:var(--teal); color:var(--text);}

  /* ---------- customer view ---------- */
  .cust-wrap{max-width:480px; margin:0 auto; padding:36px 18px 60px;}
  .cust-header{text-align:center; margin-bottom:26px;}
  .cust-header .brand-mark{margin:0 auto 12px;}
  .cust-header h1{font-family:'Chakra Petch', sans-serif; font-size:21px; margin:0 0 4px;}
  .cust-header p{color:var(--text-dim); font-size:13px; margin:0;}

  .cust-search-row{display:flex; gap:8px; margin-bottom:8px;}
  .cust-search-row input{
    flex:1; padding:11px 13px; background:var(--panel); border:1px solid var(--line);
    border-radius:6px; color:var(--text); font-family:inherit; font-size:14px;
  }
  .cust-search-row input:focus{outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal);}
  .cust-hint{font-size:11.5px; color:var(--text-dim); margin:0 0 22px;}

  .cust-results{display:flex; flex-direction:column; gap:10px;}
  .cust-empty{text-align:center; color:var(--text-dim); padding:40px 10px; font-size:13px;}

  .cust-result-card{
    position:relative; background:var(--paper); color:var(--paper-text);
    border-radius:3px 8px 8px 3px; padding:13px 13px 13px 28px; cursor:pointer;
    box-shadow:2px 3px 0 rgba(0,0,0,0.24); border:1px solid #d9cfb8;
  }
  .cust-result-card::before{
    content:''; position:absolute; top:13px; left:10px; width:8px; height:8px; border-radius:50%;
    background:var(--board); box-shadow:0 0 0 2px #b9ac8e;
  }
  .cust-result-card .t-no{font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--paper-dim);}
  .cust-result-card .t-customer{font-family:'Chakra Petch', sans-serif; font-weight:600; font-size:14px; margin:2px 0 5px;}
  .cust-result-card .cust-status-pill{
    display:inline-flex; align-items:center; gap:5px; font-size:11.5px; padding:3px 9px;
    border-radius:20px; background:rgba(0,0,0,0.06);
  }
  .cust-status-pill .dot{width:6px;height:6px;border-radius:50%;}

  .cust-detail{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:22px;}
  .cust-back{background:none; border:none; color:var(--text-dim); font-size:12.5px; cursor:pointer; margin-bottom:14px; padding:0;}
  .cust-back:hover{color:var(--text);}
  .cust-detail-top{margin-bottom:18px;}
  .cust-detail-top .t-no{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim);}
  .cust-detail-top h3{font-family:'Chakra Petch', sans-serif; font-size:18px; margin:3px 0 2px;}
  .cust-detail-top p{color:var(--text-dim); font-size:12.5px; margin:0;}

  .progress-track{display:flex; margin:22px 0 18px;}
  .prog-step{flex:1; display:flex; flex-direction:column; align-items:center; text-align:center; position:relative;}
  .prog-step .prog-line{
    position:absolute; top:9px; left:-50%; width:100%; height:2px; background:var(--line-soft); z-index:0;
  }
  .prog-step:first-child .prog-line{display:none;}
  .prog-step.done .prog-line, .prog-step.current .prog-line{background:var(--step-color);}
  .prog-node{
    width:19px; height:19px; border-radius:50%; border:2px solid var(--line-soft); background:var(--board);
    z-index:1; margin-bottom:7px;
  }
  .prog-step.done .prog-node{background:var(--step-color); border-color:var(--step-color);}
  .prog-step.current .prog-node{border-color:var(--step-color); box-shadow:0 0 0 4px rgba(255,255,255,0.06);}
  .prog-label{font-size:10px; color:var(--text-dim); line-height:1.3;}
  .prog-step.current .prog-label{color:var(--text); font-weight:600;}

  .cust-message{
    background:var(--panel-2); border-left:3px solid var(--status-color, var(--teal));
    border-radius:6px; padding:12px 14px; font-size:13.5px; margin-bottom:18px;
  }
  .cust-info-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px 16px; font-size:13px;}
  .cust-info-grid .k{color:var(--text-dim); font-size:11px;}
  .cust-info-grid .v{margin-top:2px;}

  @media (max-width:640px){
    .row2{grid-template-columns:1fr;}
    .topbar{padding:12px 14px;}
    .board{padding:14px;}
  }
</style>
</head>
<body>

<div class="conn-banner" id="connBanner"></div>

<div id="staffView">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <h1>คิวซ่อม</h1>
        <p>ช่างคอมพิวเตอร์ &amp; กล้องวงจรปิด — หลังบ้าน</p>
      </div>
    </div>
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="ค้นหา ลูกค้า / เบอร์ / เลขที่งาน">
    </div>
    <div class="filter-chips" id="filterChips"></div>
    <button class="link-btn" id="btnCustLink">ลิงก์ให้ลูกค้าเช็คสถานะ</button>
    <button class="btn-new" id="btnNew">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      งานใหม่
    </button>
  </div>

  <div class="board" id="board"></div>
  <div class="footnote">ข้อมูลซิงก์แบบเรียลไทม์ผ่าน Firebase — ทุกคนที่เปิดหน้านี้เห็นข้อมูลเดียวกัน</div>
</div>

<div id="customerView" style="display:none">
  <div class="cust-wrap">
    <div class="cust-header">
      <div class="brand-mark"></div>
      <h1>เช็คสถานะงานซ่อม</h1>
      <p>กรอกเบอร์โทรหรือเลขที่งานเพื่อดูความคืบหน้า</p>
    </div>

    <div class="cust-search-row">
      <input type="text" id="custSearchInput" placeholder="เบอร์โทร หรือ เลขที่งาน เช่น WO-0001">
      <button class="btn btn-primary" id="custSearchBtn">ค้นหา</button>
    </div>
    <p class="cust-hint">ไม่ต้องใส่ขีด/วรรค พิมพ์แค่บางส่วนก็ค้นได้</p>

    <div id="custResults" class="cust-results"></div>
    <div id="custDetail" style="display:none"></div>
  </div>
  <div class="footnote" style="padding-top:0;">
    <button class="link-btn" id="btnBackToStaff">กลับสู่หน้าเจ้าหน้าที่</button>
  </div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<!-- Firebase (compat SDK — simplest to drop into a single-file app) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ====== Firebase setup ======
   Replace with your own project config if you fork this. */
const firebaseConfig = {
  apiKey: "AIzaSyDPUenapNxZISOSqS2miSJKZodf9Jr1AhQ",
  authDomain: "repair-queue-8638f.firebaseapp.com",
  projectId: "repair-queue-8638f",
  storageBucket: "repair-queue-8638f.firebasestorage.app",
  messagingSenderId: "452186522360",
  appId: "1:452186522360:web:3693381c088b2db035b10d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
// Single shared document holds the whole board — simple & fine at shop scale.
const shopDocRef = db.collection('shop').doc('jobs');

const STATUSES = [
  {key:'received',   label:'รับงาน',           color:'var(--steel)', order:1, overdueDays:null},
  {key:'repairing',  label:'ระหว่างซ่อม',       color:'var(--teal)',  order:2, overdueDays:3},
  {key:'repaired',   label:'ซ่อมเสร็จแล้ว',      color:'var(--blue)',  order:3, overdueDays:null},
  {key:'claim',      label:'เคลม',              color:'var(--copper)',order:4, overdueDays:7},
  {key:'waiting',    label:'รอรับกลับ',         color:'var(--gold)',  order:5, overdueDays:5},
  {key:'picked_up',  label:'รับกลับแล้ว',        color:'var(--green)', order:6, overdueDays:null},
];
const DEVICE_TYPES = ['คอมพิวเตอร์','โน้ตบุ๊ก','กล้องวงจรปิด','เครื่องปริ้นเตอร์','เครื่องสำรองไฟ','อื่นๆ'];

let state = { seq:0, jobs:[] };
let activeFilter = 'all';
let searchTerm = '';
let loaded = false;

function showConnBanner(msg, ok){
  const el = document.getElementById('connBanner');
  el.textContent = msg;
  el.classList.add('show');
  el.classList.toggle('ok', !!ok);
  if(ok){
    setTimeout(()=> el.classList.remove('show'), 2500);
  }
}

/* ---------- realtime sync ---------- */
// Live-listen to the shared doc; any staff/customer change reflects everywhere instantly.
shopDocRef.onSnapshot(
  (snap)=>{
    if(snap.exists){
      const data = snap.data();
      state = { seq: data.seq || 0, jobs: data.jobs || [] };
    }else{
      state = { seq:0, jobs:[] };
    }
    loaded = true;
    showConnBanner('เชื่อมต่อ Firebase สำเร็จ', true);
    renderChips();
    renderBoard();
    // if customer detail is open, refresh it live too
    const cd = document.getElementById('custDetail');
    if(cd && cd.style.display !== 'none' && cd.dataset.jobId){
      renderCustDetail(cd.dataset.jobId);
    }
  },
  (err)=>{
    console.error(err);
    showConnBanner('เชื่อมต่อ Firebase ไม่สำเร็จ — ตรวจสอบ Firestore rules / การตั้งค่าโปรเจกต์', false);
  }
);

async function saveData(){
  try{
    await shopDocRef.set(state);
  }catch(e){
    console.error(e);
    showToast('บันทึกไม่สำเร็จ — ตรวจสอบการเชื่อมต่อ Firebase');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._tm);
  showToast._tm = setTimeout(()=>t.classList.remove('show'), 2600);
}

function fmtDate(iso){
  if(!iso) return '-';
  const d = new Date(iso);
  return d.toLocaleString('th-TH', {day:'numeric', month:'short', year:'2-digit', hour:'2-digit', minute:'2-digit'});
}

function daysSince(iso){
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  return Math.floor(diff / (1000*60*60*24));
}

function ticketNo(seq){
  return 'WO-' + String(seq).padStart(4,'0');
}

function statusMeta(key){
  return STATUSES.find(s=>s.key===key);
}

/* ---------- rendering ---------- */

function renderChips(){
  const wrap = document.getElementById('filterChips');
  const options = [{key:'all', label:'ทั้งหมด'}, ...DEVICE_TYPES.map(d=>({key:d,label:d}))];
  wrap.innerHTML = '';
  options.forEach(opt=>{
    const b = document.createElement('button');
    b.className = 'chip' + (activeFilter===opt.key ? ' active':'');
    b.textContent = opt.label;
    b.onclick = ()=>{ activeFilter = opt.key; renderChips(); renderBoard(); };
    wrap.appendChild(b);
  });
}

function getFilteredJobs(){
  return state.jobs.filter(j=>{
    if(activeFilter!=='all' && j.deviceType!==activeFilter) return false;
    if(searchTerm){
      const s = searchTerm.toLowerCase();
      const hay = (j.customer+' '+j.phone+' '+j.ticketNo).toLowerCase();
      if(!hay.includes(s)) return false;
    }
    return true;
  });
}

function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  const jobs = getFilteredJobs();

  if(!loaded){
    board.innerHTML = '<div class="empty-board">กำลังเชื่อมต่อ Firebase…</div>';
    return;
  }

  STATUSES.forEach(st=>{
    const col = document.createElement('div');
    col.className = 'column';
    col.style.setProperty('--col-color', st.color);

    const colJobs = jobs.filter(j=>j.status===st.key)
      .sort((a,b)=> new Date(b.statusChangedAt) - new Date(a.statusChangedAt));

    col.innerHTML = `
      <div class="col-head">
        <span class="col-eyebrow">${String(st.order).padStart(2,'0')}</span>
        <span class="col-title">${st.label}</span>
        <span class="col-count">${colJobs.length}</span>
      </div>
      <div class="col-body" id="col-${st.key}"></div>
    `;
    board.appendChild(col);

    const body = col.querySelector('.col-body');
    if(colJobs.length===0){
      body.innerHTML = `<div class="col-empty">ยังไม่มีงานในขั้นนี้</div>`;
    }else{
      colJobs.forEach(j=> body.appendChild(renderTicket(j, st)));
    }
  });
}

function renderTicket(j, st){
  const card = document.createElement('div');
  const days = daysSince(j.statusChangedAt);
  const overdue = st.overdueDays!==null && days > st.overdueDays;
  card.className = 'ticket' + (overdue ? ' overdue' : '');
  card.tabIndex = 0;
  card.innerHTML = `
    <div class="t-no">${j.ticketNo}</div>
    <div class="t-customer">${escapeHtml(j.customer)}</div>
    <div class="t-device">${escapeHtml(j.deviceType)}${j.deviceDetail ? ' · '+escapeHtml(j.deviceDetail) : ''}</div>
    <div class="t-issue">${escapeHtml(j.issue)}</div>
    <div class="t-foot">
      <span>${j.technician ? escapeHtml(j.technician) : 'ยังไม่ระบุช่าง'}</span>
      <span class="t-days ${overdue?'warn':''}">${days===0?'วันนี้':days+' วัน'}</span>
    </div>
  `;
  card.onclick = ()=> openDetail(j.id);
  card.onkeydown = (e)=>{ if(e.key==='Enter') openDetail(j.id); };
  return card;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

/* ---------- add job modal ---------- */

        <h2>งานใหม่ <button class="close-x" id="closeBtn">&times;</button></h2>

          <div class="row2">
            <div class="field">
              <label>ชื่อลูกค้า *</label>
              <input type="text" name="customer" required>
            </div>
            <div class="field">
              <label>เบอร์โทร *</label>
              <input type="text" name="phone" required>
            </div>
          </div>
          <div class="row2">
            <div class="field">
              <label>ประเภทอุปกรณ์ *</label>
              <select name="deviceType" required>
                ${DEVICE_TYPES.map(d=>`<option value="${d}">${d}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>ยี่ห้อ / รุ่น</label>
              <input type="text" name="deviceDetail" placeholder="เช่น Dell Inspiron, Hikvision">
            </div>
          </div>
          <div class="field">
            <label>อาการ / ปัญหา *</label>
            <textarea name="issue" required placeholder="อธิบายอาการที่ลูกค้าแจ้ง"></textarea>
          </div>
          <div class="row2">
            <div class="field">
              <label>ช่างผู้รับผิดชอบ</label>
              <input type="text" name="technician" placeholder="ระบุภายหลังก็ได้">
            </div>
            <div class="field">
              <label>ค่าบริการโดยประมาณ (บาท)</label>
              <input type="number" name="cost" min="0" step="1">
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn" id="cancelBtn">ยกเลิก</button>
            <button type="submit" class="btn btn-primary" id="submitJobBtn">รับงาน</button>
          </div>
        </form>
      </div>
    </div>
  `;

  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeModal(); };
  document.getElementById('newJobForm').onsubmit = async (e)=>{
    e.preventDefault();
    const submitBtn = document.getElementById('submitJobBtn');
    submitBtn.disabled = true;
    const fd = new FormData(e.target);
    const now = new Date().toISOString();
    state.seq += 1;
    const job = {
      id: 'j'+Date.now()+Math.random().toString(36).slice(2,7),

      deviceDetail: fd.get('deviceDetail').trim(),

      createdAt: now,
      statusChangedAt: now,

    state.jobs.unshift(job);
    await saveData();
    closeModal();
    showToast(`รับงาน ${job.ticketNo} เรียบร้อย`);
  };
}

/* ---------- detail modal ---------- */

function openDetail(jobId){
  const j = state.jobs.find(x=>x.id===jobId);
  if(!j) return;
  const root = document.getElementById('modalRoot');

  root.innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h2>${j.ticketNo} <button class="close-x" id="closeBtn">&times;</button></h2>
        <p class="sub">รับงานเมื่อ ${fmtDate(j.createdAt)}</p>

        <div class="stepper" id="stepper"></div>

        <div class="info-grid">
          <div><div class="k">ลูกค้า</div><div class="v">${escapeHtml(j.customer)}</div></div>
          <div><div class="k">เบอร์โทร</div><div class="v">${escapeHtml(j.phone)}</div></div>
          <div><div class="k">อุปกรณ์</div><div class="v">${escapeHtml(j.deviceType)}${j.deviceDetail?' · '+escapeHtml(j.deviceDetail):''}</div></div>
          <div><div class="k">ช่างผู้รับผิดชอบ</div><div class="v" id="techView">${j.technician ? escapeHtml(j.technician) : '<span style="color:var(--text-dim)">ยังไม่ระบุ</span>'}</div></div>
          <div><div class="k">อาการ / ปัญหา</div><div class="v">${escapeHtml(j.issue)}</div></div>
          <div><div class="k">ค่าบริการ</div><div class="v">${j.cost!==null && j.cost!==undefined ? Number(j.cost).toLocaleString('th-TH')+' บาท' : '<span style="color:var(--text-dim)">ยังไม่ระบุ</span>'}</div></div>
        </div>

        <div class="field">
          <label>แก้ไขช่างผู้รับผิดชอบ / ค่าบริการ</label>
          <div class="row2">
            <input type="text" id="editTech" placeholder="ชื่อช่าง" value="${escapeHtml(j.technician)}">
            <input type="number" id="editCost" placeholder="ค่าบริการ (บาท)" value="${j.cost ?? ''}">
          </div>
        </div>
        <div class="form-actions" style="margin-top:-4px; margin-bottom:6px;">
          <button class="btn" id="saveFieldsBtn">บันทึกการแก้ไข</button>
        </div>

        <div class="section-title">บันทึกงาน</div>
        <div id="notesList"></div>
        <div class="field" style="margin-top:8px;">
          <textarea id="newNote" placeholder="เพิ่มบันทึก เช่น อะไหล่ที่ใช้ / สาเหตุ / นัดหมาย"></textarea>
        </div>
        <div class="form-actions" style="margin-top:-4px;">
          <button class="btn" id="addNoteBtn">เพิ่มบันทึก</button>
        </div>

        <div class="section-title">ประวัติสถานะ</div>
        <div id="historyList"></div>

        <div class="danger-zone">
          <button class="btn btn-danger" id="deleteBtn">ลบงานนี้</button>
        </div>
      </div>
    </div>
  `;

  const stepper = document.getElementById('stepper');
  STATUSES.forEach(st=>{
    const b = document.createElement('button');
    b.className = 'step-btn' + (j.status===st.key ? ' current':'');
    b.style.setProperty('--step-color', st.color);
    b.innerHTML = `<span class="dot"></span>${st.label}`;
    b.onclick = async ()=>{
      if(j.status===st.key) return;
      const now = new Date().toISOString();
      j.status = st.key;
      j.statusChangedAt = now;
      j.history.push({status:st.key, at:now});
      await saveData();
      openDetail(jobId);
      showToast(`เปลี่ยนสถานะเป็น "${st.label}"`);
    };
    stepper.appendChild(b);
  });

  renderNotes(j);
  renderHistory(j);

  document.getElementById('closeBtn').onclick = closeModal;
  document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeModal(); };

  document.getElementById('saveFieldsBtn').onclick = async ()=>{
    j.technician = document.getElementById('editTech').value.trim();
    const costVal = document.getElementById('editCost').value;
    j.cost = costVal ? Number(costVal) : null;
    await saveData();
    openDetail(jobId);
    showToast('บันทึกแล้ว');
  };

  document.getElementById('addNoteBtn').onclick = async ()=>{
    const ta = document.getElementById('newNote');
    const text = ta.value.trim();
    if(!text) return;
    j.notes.unshift({text, at: new Date().toISOString()});
    await saveData();
    openDetail(jobId);
  };

  const delBtn = document.getElementById('deleteBtn');
  let confirming = false;
  delBtn.onclick = async ()=>{
    if(!confirming){
      confirming = true;
      delBtn.textContent = 'ยืนยันการลบ?';
      delBtn.classList.add('confirming');
      setTimeout(()=>{
        if(confirming){
          confirming = false;
          delBtn.textContent = 'ลบงานนี้';
          delBtn.classList.remove('confirming');
        }
      }, 4000);
    }else{
      state.jobs = state.jobs.filter(x=>x.id!==jobId);
      closeModal();
      await saveData();
      showToast('ลบงานแล้ว');
    }
  };
}

function renderNotes(j){
  const el = document.getElementById('notesList');
  if(j.notes.length===0){
    el.innerHTML = `<div style="color:var(--text-dim); font-size:12.5px;">ยังไม่มีบันทึก</div>`;
    return;
  }
  el.innerHTML = j.notes.map(n=>`
    <div class="note-item">
      <span class="note-time">${fmtDate(n.at)}</span>
      ${escapeHtml(n.text)}
    </div>
  `).join('');
}

function renderHistory(j){
  const el = document.getElementById('historyList');
  el.innerHTML = [...j.history].reverse().map(h=>{
    const meta = statusMeta(h.status);
    return `<div class="history-item"><span class="h-dot" style="background:${meta.color}"></span><b>${meta.label}</b> — ${fmtDate(h.at)}</div>`;
  }).join('');
}

function closeModal(){
  document.getElementById('modalRoot').innerHTML = '';
}

/* ---------- customer status-check view ---------- */

const FRIENDLY_MESSAGES = {
  received:  'ร้านได้รับเครื่องของคุณแล้ว กำลังรอช่างตรวจสอบอาการ',
  repairing: 'ช่างกำลังดำเนินการซ่อมอยู่ในขณะนี้',
  repaired:  'ซ่อมเสร็จเรียบร้อยแล้ว กำลังเตรียมเครื่องให้',
  claim:     'เครื่องถูกส่งเคลมกับผู้ผลิต/ตัวแทนจำหน่าย กรุณารอการติดต่อกลับจากร้าน',
  waiting:   'เครื่องพร้อมแล้ว รอลูกค้ามารับที่ร้าน',
  picked_up: 'ลูกค้ารับเครื่องกลับเรียบร้อยแล้ว ขอบคุณที่ใช้บริการ',
};

function normalizeQuery(s){
  return (s||'').toLowerCase().replace(/[\s-]/g,'');
}

function custSearch(){
  const raw = document.getElementById('custSearchInput').value.trim();
  const resultsEl = document.getElementById('custResults');
  const detailEl = document.getElementById('custDetail');
  detailEl.style.display = 'none';
  detailEl.dataset.jobId = '';
  detailEl.innerHTML = '';
  resultsEl.style.display = '';

  if(!raw){
    resultsEl.innerHTML = `<div class="cust-empty">พิมพ์เบอร์โทรหรือเลขที่งานเพื่อค้นหา</div>`;
    return;
  }
  const q = normalizeQuery(raw);
  const matches = state.jobs.filter(j=>{
    const hay = normalizeQuery(j.phone + ' ' + j.ticketNo);
    return hay.includes(q);
  }).sort((a,b)=> new Date(b.statusChangedAt) - new Date(a.statusChangedAt));

  if(matches.length===0){
    resultsEl.innerHTML = `<div class="cust-empty">ไม่พบข้อมูล กรุณาตรวจสอบเบอร์โทรหรือเลขที่งานอีกครั้ง<br>หรือติดต่อร้านโดยตรง</div>`;
    return;
  }
  if(matches.length===1){
    renderCustDetail(matches[0].id);
    return;
  }
  resultsEl.innerHTML = '';
  matches.forEach(j=>{
    const st = statusMeta(j.status);
    const card = document.createElement('div');
    card.className = 'cust-result-card';
    card.innerHTML = `
      <div class="t-no">${j.ticketNo}</div>
      <div class="t-customer">${escapeHtml(j.deviceType)}${j.deviceDetail?' · '+escapeHtml(j.deviceDetail):''}</div>
      <span class="cust-status-pill"><span class="dot" style="background:${st.color}"></span>${st.label}</span>
    `;
    card.onclick = ()=> renderCustDetail(j.id);
    resultsEl.appendChild(card);
  });
}

function renderCustDetail(jobId){
  const j = state.jobs.find(x=>x.id===jobId);
  if(!j) return;
  const resultsEl = document.getElementById('custResults');
  const detailEl = document.getElementById('custDetail');
  resultsEl.style.display = 'none';
  detailEl.style.display = '';
  detailEl.dataset.jobId = jobId;
  const st = statusMeta(j.status);
  const visited = new Set(j.history.map(h=>h.status));

  const track = STATUSES.map((s)=>{
    const cls = s.key===j.status ? 'current' : (visited.has(s.key) ? 'done' : '');
    return `
      <div class="prog-step ${cls}" style="--step-color:${s.color}">
        <div class="prog-line"></div>
        <div class="prog-node"></div>
        <div class="prog-label">${s.label}</div>
      </div>
    `;
  }).join('');

  detailEl.innerHTML = `
    <button class="cust-back" id="custBackBtn">&larr; ค้นหาใหม่</button>
    <div class="cust-detail">
      <div class="cust-detail-top">
        <div class="t-no">${j.ticketNo}</div>
        <h3>${escapeHtml(j.deviceType)}${j.deviceDetail?' · '+escapeHtml(j.deviceDetail):''}</h3>
        <p>อัปเดตล่าสุด ${fmtDate(j.statusChangedAt)}</p>
      </div>
      <div class="progress-track">${track}</div>
      <div class="cust-message" style="--status-color:${st.color}">${FRIENDLY_MESSAGES[j.status] || ''}</div>
      <div class="cust-info-grid">
        <div><div class="k">อาการที่แจ้ง</div><div class="v">${escapeHtml(j.issue)}</div></div>
        <div><div class="k">ค่าบริการ</div><div class="v">${j.cost!==null && j.cost!==undefined ? Number(j.cost).toLocaleString('th-TH')+' บาท' : 'รอแจ้งราคา'}</div></div>
      </div>
    </div>
  `;
  document.getElementById('custBackBtn').onclick = ()=>{
    detailEl.style.display = 'none';
    detailEl.dataset.jobId = '';
    resultsEl.style.display = '';
  };
}

/* ---------- mode switching (staff / customer) ---------- */

function switchMode(mode){
  document.getElementById('staffView').style.display = mode==='customer' ? 'none' : '';
  document.getElementById('customerView').style.display = mode==='customer' ? '' : 'none';
  if(mode==='customer'){
    location.hash = 'customer';
    document.getElementById('custSearchInput').value = '';
    document.getElementById('custResults').innerHTML = `<div class="cust-empty">พิมพ์เบอร์โทรหรือเลขที่งานเพื่อค้นหา</div>`;
    document.getElementById('custDetail').style.display = 'none';
  }else{
    history.replaceState(null, '', location.pathname + location.search);
  }
}

function initMode(){
  switchMode(location.hash === '#customer' ? 'customer' : 'staff');
}

/* ---------- events ---------- */

document.getElementById('btnNew').onclick = openNewJobModal;
document.getElementById('searchInput').oninput = (e)=>{
  searchTerm = e.target.value;
  renderBoard();
};
document.addEventListener('keydown', (e)=>{
  if(e.key==='Escape') closeModal();
});

document.getElementById('btnCustLink').onclick = async ()=>{
  const link = location.origin + location.pathname + '#customer';
  try{
    await navigator.clipboard.writeText(link);
    showToast('คัดลอกลิงก์แล้ว — ส่งให้ลูกค้าได้เลย');
  }catch(e){
    showToast(link);
  }
};
document.getElementById('btnBackToStaff').onclick = ()=> switchMode('staff');
document.getElementById('custSearchBtn').onclick = custSearch;
document.getElementById('custSearchInput').onkeydown = (e)=>{
  if(e.key==='Enter') custSearch();
};

initMode();
</script>
